<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Solver</title>
</head>
<body style="background:#111;color:#fff;font-family:sans-serif;padding:20px;max-width:600px;margin:0 auto">
<h2 style="color:#f97316;text-align:center">🔬 AI সমাধানকারী</h2>
<p style="text-align:center;color:#6366f1;font-size:13px">✨ Made by Radwan Islam Alif</p>
<br>
<textarea id="q" style="width:100%;height:120px;background:#222;border:1px solid #444;color:#fff;padding:10px;border-radius:8px;font-size:16px;font-family:sans-serif" placeholder="প্রশ্ন লিখো..."></textarea>
<br><br>
<button id="btn" style="width:100%;padding:14px;background:#f97316;border:none;border-radius:8px;color:white;font-size:18px;cursor:pointer">🚀 সমাধান করুন</button>
<br><br>
<div id="out" style="background:#222;border-radius:8px;padding:15px;white-space:pre-wrap;line-height:1.8;font-size:15px;display:none"></div>
<script>
document.getElementById('btn').addEventListener('click', async function(){
var q=document.getElementById('q').value;
if(!q){alert('প্রশ্ন লিখুন');return}
this.textContent='⏳ অপেক্ষা করুন...';
this.disabled=true;
document.getElementById('out').style.display='none';
try{
var r=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer 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'},body:JSON.stringify({model:'llama-3.3-70b-versatile',max_tokens:2000,messages:[{role:'system',content:'তুমি একজন শিক্ষক। সব উত্তর বাংলায় ধাপে ধাপে দাও।'},{role:'user',content:q}]})});
var d=await r.json();
document.getElementById('out').textContent=d.choices[0].message.content;
document.getElementById('out').style.display='block';
}catch(e){alert('Error: '+e.message)}
this.textContent='🚀 সমাধান করুন';
this.disabled=false;
});
</script>
</body>
</html>
